<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダヴィネスご購入時のご協力のお願い</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: #faf7f2;
    color: #3a2f28;
    padding: 24px 16px 60px;
  }
  .back-link {
    display: block;
    max-width: 420px;
    margin: 0 auto 20px;
    font-size: 13px;
    color: #a0937f;
    text-decoration: none;
  }
  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #8a7c6f;
    margin-bottom: 28px;
  }
  .content {
    max-width: 420px;
    margin: 0 auto;
  }
  .box {
    background: #fff;
    border: 1px solid #e8e0d5;
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(58, 47, 40, 0.06);
  }
  .box p {
    font-size: 13px;
    line-height: 1.9;
    color: #5c4a38;
  }
  .screenshot {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    border: 1px solid #e8e0d5;
    margin-top: 16px;
  }
  .step-title {
    font-size: 14px;
    font-weight: 600;
    color: #3a2f28;
    margin-bottom: 14px;
  }
  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    background: #faf5eb;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .setting-row:last-child {
    margin-bottom: 0;
  }
  .setting-label {
    font-size: 12px;
    color: #a0937f;
  }
  .setting-value {
    font-size: 15px;
    font-weight: 700;
    color: #b08a5c;
  }
  .reason-box {
    background: #fff8ec;
    border: 1px solid #eddfc2;
    border-radius: 10px;
    padding: 16px 18px;
  }
  .reason-box p {
    font-size: 12px;
    color: #8a6d3b;
    line-height: 1.8;
  }
  .cta {
    display: block;
    text-align: center;
    background: #3a2f28;
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 16px;
    border-radius: 10px;
    margin-top: 24px;
  }
</style>

<body>

  <a class="back-link" href="./brand-link.html">← ブランド一覧に戻る</a>

        お手数ですが、以下の内容でご設定ください。
      </p>
      <img class="screenshot" src="./images/davines_setting_screenshot.png" alt="店舗選択設定">
    </div>

    <div class="box">
      <div class="setting-row">
        <span class="setting-label">都道府県</span>
        <span class="setting-value">千葉県</span>

      <div class="setting-row">
        <span class="setting-label">サロン</span>
        <span class="setting-value">CHERO</span>
      </div>
    </div>

    <div class="reason-box">

        ※ダヴィネスの商品はシリアル番号で管理されており、正規のサロン経由での購入であることを示すための設定です。転売品や非正規流通品の防止にもつながりますので、ご協力をお願いいたします。
      </p>
    </div>

    <a class="cta" href="https://davines.co.jp/" target="_blank" rel="noopener">ダヴィネス公式サイトへ進む</a>

</html>
